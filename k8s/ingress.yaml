# Requires an nginx ingress controller and (optionally) cert-manager installed
# in the cluster. Replace `your-domain.example.com` and the cert-manager
# cluster-issuer annotation with values for your environment, or remove the
# cert-manager annotation and provide `ems-tls` yourself if using a
# pre-provisioned certificate.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ems-ingress
  namespace: ems
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Remove this annotation if you are not using cert-manager.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - your-domain.example.com
      secretName: ems-tls
  rules:
    - host: your-domain.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
