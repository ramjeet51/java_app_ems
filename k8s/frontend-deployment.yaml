apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ems
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace with your built & pushed image, e.g. your-registry/ems-frontend:1.0.0
          # NOTE: NEXT_PUBLIC_* values are baked in at build time (see frontend/Dockerfile
          # ARGs) — changing ems-config's NEXT_PUBLIC_API_BASE_URL after the image is built
          # has no effect unless the image is rebuilt with the new build arg.
          image: your-registry/ems-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ems-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ems
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
