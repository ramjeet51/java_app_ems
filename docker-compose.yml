version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ems-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ems_db}
      MYSQL_USER: ${DB_USERNAME:-ems_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD:-change_me_root}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ems-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ems-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /backend
        NEXT_PUBLIC_UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    container_name: ems-frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - '3000:3000'
    networks:
      - ems-network

  nginx:
    image: nginx:1.27-alpine
    container_name: ems-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
    networks:
      - ems-network

networks:
  ems-network:
    driver: bridge

volumes:
  mysql-data:
